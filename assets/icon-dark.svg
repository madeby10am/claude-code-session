<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Robot head -->
  <rect x="5" y="4" width="14" height="12" rx="2" stroke="#C5C5C5" stroke-width="1.5" fill="none"/>
  <!-- Eyes -->
  <rect x="8" y="8" width="3" height="3" rx="0.5" fill="#C5C5C5"/>
  <rect x="13" y="8" width="3" height="3" rx="0.5" fill="#C5C5C5"/>
  <!-- Antenna -->
  <line x1="12" y1="4" x2="12" y2="1" stroke="#C5C5C5" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="12" cy="1" r="1" fill="#C5C5C5"/>
  <!-- Body -->
  <rect x="7" y="17" width="10" height="4" rx="1" stroke="#C5C5C5" stroke-width="1.5" fill="none"/>
  <!-- Neck -->
  <line x1="10" y1="16" x2="10" y2="17" stroke="#C5C5C5" stroke-width="1.5"/>
  <line x1="14" y1="16" x2="14" y2="17" stroke="#C5C5C5" stroke-width="1.5"/>
</svg>
